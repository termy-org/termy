name: PR Quality

permissions:
  contents: read
  issues: read
  pull-requests: read

on:
  pull_request:
    types: [opened, reopened]

jobs:
  anti-slop:
    runs-on: ubuntu-latest
    steps:
      - uses: peakoss/anti-slop@57858eead489d08b255fab2af45a506c2ca6eab2 # v0
        with:
          max-failures: 3
          blocked-commit-authors: "claude,copilot"
          blocked-terms: |
            PINEAPPLE
