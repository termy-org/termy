<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Termy mascot icon</title>
  <desc id="desc">A friendly terminal mascot inside a light rounded app icon.</desc>
  <defs>
    <linearGradient id="tile" x1="190" y1="72" x2="820" y2="940" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F9FDFF"/>
      <stop offset="0.55" stop-color="#EAF8FF"/>
      <stop offset="1" stop-color="#D8E8F3"/>
    </linearGradient>
    <linearGradient id="shell" x1="242" y1="228" x2="800" y2="784" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8E98A8"/>
      <stop offset="0.44" stop-color="#596372"/>
      <stop offset="1" stop-color="#2C3542"/>
    </linearGradient>
    <linearGradient id="screen" x1="292" y1="330" x2="766" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B4656"/>
      <stop offset="1" stop-color="#242D3A"/>
    </linearGradient>
    <linearGradient id="eye" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#243653"/>
      <stop offset="0.58" stop-color="#1A2840"/>
      <stop offset="0.59" stop-color="#46B9EE"/>
      <stop offset="1" stop-color="#275C8D"/>
    </linearGradient>
    <linearGradient id="prompt" x1="250" y1="555" x2="410" y2="655" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C1FFC1"/>
      <stop offset="1" stop-color="#8EE99A"/>
    </linearGradient>
    <filter id="tileShadow" x="-15%" y="-10%" width="130%" height="130%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#7FA2B8" flood-opacity="0.24"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="145%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#152131" flood-opacity="0.38"/>
    </filter>
    <filter id="innerGlow" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur"/>
    </filter>
  </defs>

  <rect x="62" y="62" width="900" height="900" rx="225" fill="url(#tile)" filter="url(#tileShadow)"/>
  <path d="M126 196C162 122 244 82 366 74h300c122 0 204 38 246 114-52-54-125-82-220-84H362c-108 4-186 34-236 92z" fill="#FFFFFF" opacity="0.72"/>
  <path d="M92 727c26 116 102 177 230 185h386c114-8 188-61 224-159-20 145-104 216-252 216H344c-153 0-237-80-252-242z" fill="#B9D2E3" opacity="0.28"/>

  <g filter="url(#softShadow)">
    <path d="M176 397c3-92 57-148 154-162 112-16 252-18 416-6 81 6 128 54 143 142 16 91 18 179 5 265-13 87-70 137-170 150-146 19-287 20-423 4-91-11-141-60-150-148-8-78 0-159 25-245z" fill="#202936" opacity="0.68"/>
    <path d="M188 397c8-83 58-132 150-145 106-15 240-17 402-5 75 6 118 51 132 132 14 83 16 164 4 245-12 79-64 125-157 137-140 19-275 20-407 4-84-10-130-56-139-137-8-75-3-152 15-231z" fill="url(#shell)"/>
    <path d="M226 407c8-55 42-87 102-94 118-14 256-16 414-6 57 4 88 36 96 95 10 70 11 139 3 205-8 64-47 100-117 109-145 18-282 19-411 4-65-8-101-43-108-104-7-68 0-138 21-209z" fill="#1D2632" opacity="0.8"/>
    <path d="M244 428c8-47 38-74 91-80 112-13 242-14 390-5 49 4 76 31 83 83 9 61 9 121 2 181-7 55-41 87-104 95-134 16-262 17-383 3-57-7-88-37-94-90-6-60-1-122 15-187z" fill="url(#screen)"/>
    <path d="M262 386c12-20 35-32 70-37 109-13 238-14 386-5 50 4 78 27 88 70-184-20-364-22-539-6-3-8-5-15-5-22z" fill="#515C6E" opacity="0.22"/>
    <path d="M220 391c9-65 48-104 118-117 119-20 256-21 410-7 54 5 88 30 102 75-18-30-53-47-105-51-153-13-289-11-408 6-68 10-107 41-117 94z" fill="#FFFFFF" opacity="0.48"/>
  </g>

  <g filter="url(#innerGlow)">
    <circle cx="366" cy="486" r="58" fill="#111927"/>
    <circle cx="366" cy="486" r="44" fill="url(#eye)"/>
    <circle cx="346" cy="494" r="25" fill="#101827"/>
    <circle cx="386" cy="460" r="20" fill="#FFFFFF"/>

    <circle cx="674" cy="486" r="58" fill="#111927"/>
    <circle cx="674" cy="486" r="44" fill="url(#eye)"/>
    <circle cx="654" cy="494" r="25" fill="#101827"/>
    <circle cx="694" cy="460" r="20" fill="#FFFFFF"/>
  </g>

  <path d="M472 504c0 34 28 62 62 62s62-28 62-62" fill="none" stroke="#171F2B" stroke-width="18" stroke-linecap="round"/>
  <ellipse cx="735" cy="538" rx="25" ry="14" fill="#F69CB0"/>

  <path d="M266 558l48 48-48 48" fill="none" stroke="url(#prompt)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M346 654h70" fill="none" stroke="url(#prompt)" stroke-width="24" stroke-linecap="round"/>
</svg>
